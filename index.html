<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auxiliar de Criação de Catálogos</title>
  <meta name="theme-color" content="#5f7f5a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="toast" class="toast" aria-live="polite"></div>

  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <div id="loginBrandMark" class="brand-mark">✿</div>
      <h1>Auxiliar de Catálogos</h1>
      <p>Entre com a senha da floricultura para gerenciar produtos e gerar PDFs.</p>
      <form id="loginForm" class="login-form">
          </div>

          <div class="form-grid">
            <label>Imagem de fundo do catálogo
              <select id="catalogBackgroundMode">
                <option value="preset_1">Fundo 01 - folhas claras</option>
                <option value="preset_2">Fundo 02 - eucalipto</option>
                <option value="preset_3">Fundo 03 - floral rosado</option>
                <option value="preset_4">Fundo 04 - verde suave</option>
                <option value="preset_5">Fundo 05 - azul acinzentado</option>
              </select>
            </label>
          </div>
          <label>Rodapé promocional<textarea id="promoFooter" rows="3"></textarea></label>
          <div class="checkbox-row">
            <label><input id="hideUnavailablePdf" type="checkbox" /> Ocultar produtos indisponíveis do PDF</label>
            <label><input id="showPromoFooter" type="checkbox" /> Mostrar rodapé promocional nas páginas internas</label>
          </div>
        </form>
      </section>


    </section>
  </main>

  <dialog id="productDialog" class="modal">
    <form id="productForm" method="dialog">
      <header class="modal-header">
        <h3 id="productDialogTitle">Novo produto</h3>
        <button type="button" id="closeProductDialog" class="icon-btn">×</button>
      </header>
      <input type="hidden" id="productId" />
      <div class="form-grid">
        <label>Nome do produto<input id="productName" required /></label>
        <label>Preço<input id="productPrice" type="number" step="0.01" min="0" required /></label>
      </div>
      <label>Descrição<textarea id="productDescription" rows="4"></textarea></label>
      <div class="form-grid">
        <label>Categoria<select id="productCategory" required></select></label>
        <label class="checkbox-label"><input id="productAvailable" type="checkbox" checked /> Produto disponível</label>
      </div>
      <label>Imagem do produto<input id="productImage" type="file" accept="image/*" /></label>
      <div id="productImagePreview" class="product-image-preview"></div>
      <footer class="modal-actions">
        <button type="button" id="cancelProductBtn" class="secondary-btn">Cancelar</button>
        <button type="submit" class="primary-btn">Salvar produto</button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
